---
- name: Ensure Automation folder structure exists
  win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ automation_root }}"
    - "{{ log_folder }}"

- name: Remove legacy insecure Windows features
  win_feature:
    name: "{{ item }}"
    state: absent
  loop: "{{ insecure_features }}"
  notify: Log baseline change

- name: Disable AutoAdminLogon registry setting
  win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: AutoAdminLogon
    data: "0"
    type: string
  notify: Log baseline change

- name: Block legacy Telnet port via firewall
  win_firewall_rule:
    name: Block-Telnet-{{ blocked_port }}
    localport: "{{ blocked_port }}"
    action: block
    direction: in
    protocol: "{{ blocked_port_protocol }}"
    state: present
    enabled: true
  notify: Log baseline change

- name: Ensure required service is running
  win_service:
    name: "{{ required_service }}"
    state: started
